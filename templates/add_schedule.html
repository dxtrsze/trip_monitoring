{% extends "base.html" %}
{% block title %}Create Delivery Schedule - Trip Monitoring System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-calendar-plus"></i> Create New Delivery Schedule</h1>
    <a href="{{ url_for('view_schedule') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Schedules
    </a>
</div>

<form method="post" id="scheduleForm">
  <!-- Step 1: Select Date -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">From Date *</label>
          <input type="date" class="form-control" name="delivery_schedule_from" id="deliveryDateFrom" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">To Date</label>
          <input type="date" class="form-control" name="delivery_schedule_to" id="deliveryDateTo">
          <div class="form-text">Leave empty for single date</div>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Filter by Area</label>
          <select class="form-select" id="areaFilter" multiple size="3">
          </select>
          <button type="button" class="btn btn-sm btn-outline-secondary mt-1" id="clearAreaFilter">Clear Selection</button>
          <div class="form-text">Hold Ctrl/Cmd to select multiple areas</div>
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="loadBtn">Load Available Shipments</button>
      <a href="{{ url_for('view_schedule') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </div>

  <!-- Step 2: Shipments List (loaded via AJAX) -->
  <div id="shipmentsSection" style="display:none;">


    <!-- Step 3: Trips -->
    <div id="tripsContainer"></div>
    <button type="button" class="btn btn-outline-success" id="addTripBtn">+ Add Trip</button>
    <div class="mt-3">
      <button type="submit" class="btn btn-success">Save Schedule</button>
    </div>
    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Available Shipments (<span id="shipmentCount">0</span> <span id="totalCountDisplay"></span>)
        <span id="dateRangeDisplay" class="badge bg-info ms-2" style="display:none;"></span></span>
        <div>
          <button type="button" class="btn btn-sm btn-outline-primary" id="selectAllShipments">Select All</button>
          <button type="button" class="btn btn-sm btn-outline-secondary ms-1" id="unselectAllShipments">Unselect All</button>
        </div>
      </div>
      <div class="card-body">
        <div id="shipmentsList"></div>
      </div>
    </div>
  </div>

  <input type="hidden" name="trip_count" id="tripCount" value="0">
</form>

<script>
let tripCounter = 0;
let shipments = [];
let allShipments = []; // Store all shipments for filtering

// Set default From Date to tomorrow
document.addEventListener('DOMContentLoaded', function() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().split('T')[0];
  document.getElementById('deliveryDateFrom').value = tomorrowStr;
});

// Filter shipments when area changes
document.getElementById('areaFilter').addEventListener('change', function() {
  filterShipments();
});

document.getElementById('clearAreaFilter').addEventListener('click', function() {
  const areaFilter = document.getElementById('areaFilter');
  Array.from(areaFilter.options).forEach(opt => opt.selected = false);
  filterShipments();
});

function filterShipments() {
  const areaFilter = document.getElementById('areaFilter');
  const selectedAreas = Array.from(areaFilter.selectedOptions).map(opt => opt.value);

  if (selectedAreas.length === 0) {
    // Show all shipments
    shipments = allShipments;
  } else {
    // Filter by selected areas
    shipments = allShipments.filter(item => selectedAreas.includes(item.area));
  }

  renderShipments();
}

function populateAreaFilter() {
  const areaFilter = document.getElementById('areaFilter');
  const selectedAreas = Array.from(areaFilter.selectedOptions).map(opt => opt.value);

  // Get unique areas from loaded shipments
  const areas = [...new Set(allShipments.map(item => item.area))].sort();

  areaFilter.innerHTML = '';
  areas.forEach(area => {
    const option = document.createElement('option');
    option.value = area;
    option.textContent = area;
    // Preserve previous selection if area still exists
    if (selectedAreas.includes(area)) {
      option.selected = true;
    }
    areaFilter.appendChild(option);
  });
}

document.getElementById('loadBtn').addEventListener('click', function() {
  const fromDate = document.getElementById('deliveryDateFrom').value;
  const toDate = document.getElementById('deliveryDateTo').value;

  if (!fromDate) {
    alert('Please select a from date');
    return;
  }

  // Reset the trips container when loading new shipments for a different date
  document.getElementById('tripsContainer').innerHTML = '';
  tripCounter = 0;
  document.getElementById('tripCount').value = '0';

  // Build API URL with date range parameters
  let apiUrl = `/api/not_scheduled?due_date_from=${fromDate}`;
  if (toDate) {
    apiUrl += `&due_date_to=${toDate}`;
  }

  fetch(apiUrl)
    .then(res => res.json())
    .then(data => {
      allShipments = data;
      // Populate area dropdown from available shipments
      populateAreaFilter();
      // Apply area filter if one is selected
      filterShipments();
      document.getElementById('shipmentsSection').style.display = 'block';

      // Show date range badge
      const dateRangeDisplay = document.getElementById('dateRangeDisplay');
      if (toDate) {
        dateRangeDisplay.textContent = `${fromDate} to ${toDate}`;
        dateRangeDisplay.style.display = 'inline-block';
      } else {
        dateRangeDisplay.textContent = fromDate;
        dateRangeDisplay.style.display = 'inline-block';
      }
    });
});

// Also validate vehicles when delivery date changes
document.getElementById('deliveryDateFrom').addEventListener('change', function() {
  // Re-check all selected vehicles against the new date
  const allVehicleSelects = document.querySelectorAll('.vehicle-select');
  allVehicleSelects.forEach(select => {
    const tripCard = select.closest('.trip-card');
    const tripId = parseInt(tripCard.getAttribute('data-trip'));

    if (select.value) {
      checkVehicleSchedule(tripId, select.value);
    }
  });
});

document.getElementById('deliveryDateTo').addEventListener('change', function() {
  // Re-check all selected vehicles against the new date
  const allVehicleSelects = document.querySelectorAll('.vehicle-select');
  allVehicleSelects.forEach(select => {
    const tripCard = select.closest('.trip-card');
    const tripId = parseInt(tripCard.getAttribute('data-trip'));

    if (select.value) {
      checkVehicleSchedule(tripId, select.value);
    }
  });
});

function renderShipments() {
  const container = document.getElementById('shipmentsList');
  const countEl = document.getElementById('shipmentCount');
  const totalDisplayEl = document.getElementById('totalCountDisplay');

  countEl.textContent = shipments.length;

  // Show total count if filtering
  if (allShipments.length > 0 && shipments.length !== allShipments.length) {
    totalDisplayEl.textContent = `/ ${allShipments.length} total`;
  } else {
    totalDisplayEl.textContent = '';
  }

  if (shipments.length === 0) {
    if (allShipments.length > 0) {
      container.innerHTML = '<p class="text-muted">No shipments found for the selected area filter.</p>';
    } else {
      container.innerHTML = '<p class="text-muted">No unscheduled shipments found.</p>';
    }
    return;
  }

  let html = `<div class="table-responsive"><table class="table table-sm">
    <thead><tr>
      <th>Select</th>
      <th>Doc #</th>
      <th>Branch</th>
      <th>Area</th>
      <th>Due Date</th>
      <th>Total CBM</th>
    </tr></thead><tbody>`;

  shipments.forEach(item => {
    // Check if this shipment is already assigned to any trip (only check within trips container)
    const isAssigned = document.querySelector(`#tripsContainer [data-ids*="${item.data_ids[0]}"]`) ? true : false;

    html += `
      <tr class="shipment-row ${isAssigned ? 'table-secondary' : ''}" data-shipment-id="${item.data_ids[0]}">
        <td><input type="checkbox" class="shipment-checkbox" data-ids="${item.data_ids.join(',')}" data-cbm="${item.total_cbm}" data-qty="${item.ordered_qty}" data-branch="${item.branch}" data-doc-number="${item.document_number}" ${isAssigned ? 'disabled' : ''}></td>
        <td>${item.document_number} ${isAssigned ? '<span class="badge bg-secondary ms-1">Assigned</span>' : ''}</td>
        <td>${item.branch}</td>
        <td>${item.area}</td>
        <td>${item.due_date}</td>
        <td>${item.total_cbm.toFixed(2)}</td>
      </tr>`;
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;

  // Add event listeners to checkboxes for row highlighting
  container.querySelectorAll('.shipment-checkbox').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
      const row = this.closest('tr');
      if (this.checked) {
        row.classList.add('table-primary');
        row.classList.remove('table-secondary');
      } else {
        row.classList.remove('table-primary');
        // Re-add table-secondary if it was assigned before
        const isAssigned = row.querySelector('.badge');
        if (isAssigned) {
          row.classList.add('table-secondary');
        }
      }
    });
  });
}

document.getElementById('addTripBtn').addEventListener('click', addTrip);

document.getElementById('selectAllShipments').addEventListener('click', function() {
  document.querySelectorAll('.shipment-checkbox:not(:disabled)').forEach(cb => cb.checked = true);
});

document.getElementById('unselectAllShipments').addEventListener('click', function() {
  document.querySelectorAll('.shipment-checkbox').forEach(cb => cb.checked = false);
});

// Helper function to get ordinal suffix (1st, 2nd, 3rd, etc.)
function getOrdinal(n) {
  if (!n) return '—';
  // Handle 11th, 12th, 13th as special cases
  if (n % 100 >= 11 && n % 100 <= 13) {
    return n + 'th';
  }
  const lastDigit = n % 10;
  const suffixes = {1: 'st', 2: 'nd', 3: 'rd'};
  return n + (suffixes[lastDigit] || 'th');
}

function addTrip() {
  tripCounter++;
  const tripId = tripCounter;

  const tripHtml = `
    <div class="card mb-3 trip-card" data-trip="${tripId}">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Trip #${tripId}</span>
        <button type="button" class="btn btn-sm btn-danger" onclick="removeTrip(${tripId})">Remove</button>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-4 mb-3">
            <label>Vehicle *</label>
            <select name="vehicle_${tripId}" class="form-select vehicle-select" onchange="handleVehicleChange(${tripId})" required>
              <option value="">Select</option>
              {% for v in vehicles %}
              <option value="{{ v.id }}" data-capacity="{{ v.capacity or 0 }}" data-type="{{ v.type or '' }}">{{ v.plate_number }}{% if v.type %} ({{ v.type }}){% endif %}{% if v.capacity %} ({{ v.capacity }} CBM){% endif %}</option>
              {% endfor %}
            </select>
            <input type="hidden" name="vehicle_type_${tripId}" id="vehicle-type-${tripId}">
            <div class="form-text text-danger" id="vehicle-error-${tripId}" style="display:none;">This vehicle is already selected in another trip</div>
          </div>
          <div class="col-md-4 mb-3">
            <label>Driver *</label>
            <div class="border rounded p-2" style="max-height: 150px; overflow-y: auto;">
              {% for d in drivers %}
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="driver_${tripId}" value="{{ d.id }}" id="driver_${tripId}_{{ d.id }}">
                <label class="form-check-label" for="driver_${tripId}_{{ d.id }}">
                  {{ d.name }}
                </label>
              </div>
              {% endfor %}
            </div>
            <div class="form-text">Select one or more drivers</div>
          </div>
          <div class="col-md-4 mb-3">
            <label>Assistant</label>
            <div class="border rounded p-2" style="max-height: 150px; overflow-y: auto;">
              {% for a in assistants %}
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="assistant_${tripId}" value="{{ a.id }}" id="assistant_${tripId}_{{ a.id }}">
                <label class="form-check-label" for="assistant_${tripId}_{{ a.id }}">
                  {{ a.name }}
                </label>
              </div>
              {% endfor %}
            </div>
            <div class="form-text">Select one or more assistants</div>
          </div>
        </div>
        <div class="mb-3">
          <label>Assign Shipments</label>
          <div id="trip-${tripId}-shipments" class="border p-2" style="max-height:150px;overflow-y:auto;">
            <p class="text-muted mb-0">Select shipments above, then click "Assign to Trip ${tripId}"</p>
          </div>
          <button type="button" class="btn btn-sm btn-outline-primary mt-2"
                  onclick="assignToTrip(${tripId})">Assign Selected to Trip ${tripId}</button>
        </div>
        <div>
          <strong>Total CBM:</strong> <span id="trip-${tripId}-cbm">0.00</span>
          <span class="ms-3"><strong>Total Qty:</strong> <span id="trip-${tripId}-qty">0</span></span>
          <span class="ms-3"><strong>Total Utilization:</strong> <span id="trip-${tripId}-utilization">No vehicle selected</span></span>
        </div>
        <input type="hidden" name="trip_${tripId}_data_ids" id="trip-${tripId}-ids">
        <input type="hidden" name="trip_${tripId}_delivery_orders" id="trip-${tripId}-orders">
      </div>
    </div>`;

  document.getElementById('tripsContainer').insertAdjacentHTML('beforeend', tripHtml);
  document.getElementById('tripCount').value = tripCounter;

  // Add event listeners to driver checkboxes for in-house vehicle warning
  const newTripCard = document.querySelector(`.trip-card[data-trip="${tripId}"]`);
  newTripCard.querySelectorAll(`input[name="driver_${tripId}"]`).forEach(checkbox => {
    checkbox.addEventListener('change', function() {
      checkInHouseVehicleDriverWarning(tripId);
    });
  });
}

function assignToTrip(tripId) {
  const checkboxes = document.querySelectorAll('.shipment-checkbox:checked');
  const tripContainer = document.getElementById(`trip-${tripId}-shipments`);
  const idsInput = document.getElementById(`trip-${tripId}-ids`);
  const ordersInput = document.getElementById(`trip-${tripId}-orders`);
  let totalCbm = 0;
  let totalQty = 0;

  // Get current CBM, Qty, IDs, and orders from the trip
  const currentCbm = parseFloat(document.getElementById(`trip-${tripId}-cbm`).textContent) || 0;
  const currentQty = parseInt(document.getElementById(`trip-${tripId}-qty`).textContent) || 0;
  const currentIds = idsInput.value ? idsInput.value.split(',') : [];
  const currentOrders = ordersInput.value ? JSON.parse(ordersInput.value) : {};

  // Start with existing values
  let assigned = [...currentIds];
  let orders = {...currentOrders};
  totalCbm = currentCbm;
  totalQty = currentQty;

  // Auto-increment order for new shipments
  const maxOrder = Object.keys(orders).length > 0 ? Math.max(...Object.values(orders).map(Number)) : 0;
  let nextOrder = maxOrder + 1;

  // Group shipments by branch to avoid duplicate order inputs
  const branchGroups = {};

  checkboxes.forEach(cb => {
    const ids = cb.dataset.ids;
    const cbm = parseFloat(cb.dataset.cbm);
    const qty = parseInt(cb.dataset.qty) || 0;
    const branchName = cb.dataset.branch;
    const documentNumber = cb.dataset.docNumber;

    if (ids) {
      const newIds = ids.split(',');

      // Check if any of these IDs are already assigned
      const hasExistingId = newIds.some(id => assigned.includes(id));

      if (!hasExistingId) {
        // Add to assigned list
        assigned.push(...newIds);
        totalCbm += cbm;
        totalQty += qty;

        // Group by branch
        if (!branchGroups[branchName]) {
          branchGroups[branchName] = {
            dataIds: [],
            allDataIds: [],  // Track all IDs for this branch
            cbm: 0,
            qty: 0,
            docNumbers: []
          };
        }

        branchGroups[branchName].dataIds.push(newIds[0]);  // First ID for order key
        branchGroups[branchName].allDataIds.push(...newIds);  // All IDs for removal
        branchGroups[branchName].cbm += cbm;
        branchGroups[branchName].qty += qty;
        branchGroups[branchName].docNumbers.push(documentNumber);

        // Mark checkboxes as assigned
        const row = cb.closest('tr');
        if (row) {
          row.classList.remove('table-primary'); // Remove selection highlight
          row.classList.add('table-secondary');
          cb.disabled = true;

          // Add or update the "Assigned" badge
          const docCell = row.cells[1];
          let badge = docCell.querySelector('.badge');
          if (!badge) {
            badge = document.createElement('span');
            badge.className = 'badge bg-primary ms-1';
            badge.textContent = 'Assigned';
            docCell.appendChild(badge);
          }
        }
      }
    }
    cb.checked = false; // uncheck after assign
  });

  // Create one shipment display per branch
  for (const [branchName, group] of Object.entries(branchGroups)) {
    // Set the delivery order for this branch (using first data ID)
    const firstId = group.dataIds[0];
    orders[firstId] = nextOrder;
    nextOrder++;

    const shipmentId = `shipment-${firstId}`;
    const orderInputId = `order-${tripId}-${firstId}`;
    const badgeId = `badge-${tripId}-${firstId}`;

    // Format document numbers for display (show first 2, then " +X more" if needed)
    const docDisplay = group.docNumbers.length > 2
      ? `${group.docNumbers.slice(0, 2).join(', ')} +${group.docNumbers.length - 2} more`
      : group.docNumbers.join(', ');

    tripContainer.innerHTML += `
      <div class="d-flex justify-content-between align-items-center small" id="${shipmentId}" data-branch="${branchName}" data-all-ids="${group.allDataIds.join(',')}" data-qty="${group.qty}">
        <div>
          <strong>${branchName}</strong>
          <span class="text-muted">(${docDisplay})</span>
        </div>
        <div class="d-flex align-items-center">
          <span class="badge bg-primary me-2" id="${badgeId}">${getOrdinal(orders[firstId])}</span>
          <input type="number" class="form-control form-control-sm me-2"
                 id="${orderInputId}" min="1" step="1" value="${orders[firstId]}"
                 style="width: 70px;"
                 onchange="updateDeliveryOrder(${tripId}, '${firstId}', this.value)">
          <span>${group.cbm.toFixed(2)}</span>
          <button type="button" class="btn btn-sm btn-outline-danger ms-2" onclick="removeBranchFromTrip(${tripId}, '${firstId}', ${group.cbm}, '${branchName}', ${group.qty})">Remove</button>
        </div>
      </div>`;
  }

  document.getElementById(`trip-${tripId}-cbm`).textContent = totalCbm.toFixed(2);
  document.getElementById(`trip-${tripId}-qty`).textContent = totalQty;
  idsInput.value = assigned.join(',');
  ordersInput.value = JSON.stringify(orders);

  // Update utilization after adding shipments
  updateTripUtilization(tripId);
}

// Function to update delivery order when input changes
function updateDeliveryOrder(tripId, dataId, newOrder) {
  const ordersInput = document.getElementById(`trip-${tripId}-orders`);
  const orders = ordersInput.value ? JSON.parse(ordersInput.value) : {};
  orders[dataId] = parseInt(newOrder) || 1;
  ordersInput.value = JSON.stringify(orders);

  // Update the badge
  const badge = document.getElementById(`badge-${tripId}-${dataId}`);
  if (badge) {
    badge.textContent = getOrdinal(orders[dataId]);
  }
}

function removeTrip(tripId) {
  const tripCard = document.querySelector(`.trip-card[data-trip="${tripId}"]`);

  // Get the selected vehicle from this trip before removing
  const vehicleSelect = tripCard.querySelector(`.vehicle-select`);
  const selectedVehicle = vehicleSelect ? vehicleSelect.value : '';

  // Remove the trip card
  tripCard.remove();

  // Update vehicle dropdowns to re-enable the vehicle that was in the removed trip
  if (selectedVehicle) {
    updateVehicleDropdowns();
  }

  // Clean up in-house warning if it exists
  const warningDiv = document.getElementById(`inhouse-warning-${tripId}`);
  if (warningDiv) {
    warningDiv.remove();
  }
}

// Handle vehicle selection change
function handleVehicleChange(changedTripId) {
  const vehicleSelect = document.querySelector(`.trip-card[data-trip="${changedTripId}"] .vehicle-select`);
  const vehicleTypeInput = document.getElementById(`vehicle-type-${changedTripId}`);

  // Update vehicle type hidden field
  if (vehicleSelect.value) {
    const selectedOption = vehicleSelect.options[vehicleSelect.selectedIndex];
    const vehicleType = selectedOption.getAttribute('data-type') || '';
    vehicleTypeInput.value = vehicleType;
  } else {
    vehicleTypeInput.value = '';
  }

  updateVehicleDropdowns();
  updateTripUtilization(changedTripId);
  checkInHouseVehicleDriverWarning(changedTripId);

  // Check if the newly selected vehicle is a duplicate
  const selectedValue = vehicleSelect.value;
  const errorDiv = document.getElementById(`vehicle-error-${changedTripId}`);

  if (!selectedValue) {
    errorDiv.style.display = 'none';
    return;
  }

  // Check if this vehicle is selected in any other trip
  const allSelects = document.querySelectorAll('.vehicle-select');
  let isDuplicate = false;

  allSelects.forEach(select => {
    const tripCard = select.closest('.trip-card');
    const tripId = tripCard.getAttribute('data-trip');

    // Skip the changed trip and empty selections
    if (parseInt(tripId) !== changedTripId && select.value === selectedValue) {
      isDuplicate = true;
    }
  });

  if (isDuplicate) {
    errorDiv.style.display = 'block';
    errorDiv.textContent = 'This vehicle is already selected in another trip';
    vehicleSelect.classList.add('is-invalid');
  } else {
    errorDiv.style.display = 'none';
    vehicleSelect.classList.remove('is-invalid');
    // Check if vehicle is already scheduled for this date
    checkVehicleSchedule(changedTripId, selectedValue);
  }
}

// Check if in-house vehicle has no driver selected
function checkInHouseVehicleDriverWarning(tripId) {
  const vehicleSelect = document.querySelector(`.trip-card[data-trip="${tripId}"] .vehicle-select`);
  const errorDiv = document.getElementById(`vehicle-error-${tripId}`);

  if (!vehicleSelect.value) {
    return;
  }

  const selectedOption = vehicleSelect.options[vehicleSelect.selectedIndex];
  const vehicleType = selectedOption.getAttribute('data-type');

  // Check if vehicle is in-house
  if (vehicleType && vehicleType.toLowerCase() === 'in-house') {
    // Check if any driver is selected
    const driverCheckboxes = document.querySelectorAll(`.trip-card[data-trip="${tripId}"] input[name="driver_${tripId}"]:checked`);
    const hasDriver = driverCheckboxes.length > 0;

    if (!hasDriver) {
      // Show warning (use info class, not blocking)
      const existingWarning = document.getElementById(`inhouse-warning-${tripId}`);
      if (!existingWarning) {
        const warningDiv = document.createElement('div');
        warningDiv.id = `inhouse-warning-${tripId}`;
        warningDiv.className = 'form-text text-info';
        warningDiv.textContent = '⚠️ In-house vehicle typically requires a driver assigned';
        vehicleSelect.parentNode.appendChild(warningDiv);
      }
    } else {
      // Remove warning if driver is selected
      const existingWarning = document.getElementById(`inhouse-warning-${tripId}`);
      if (existingWarning) {
        existingWarning.remove();
      }
    }
  } else {
    // Remove warning if vehicle is not in-house
    const existingWarning = document.getElementById(`inhouse-warning-${tripId}`);
    if (existingWarning) {
      existingWarning.remove();
    }
  }
}

// Check if vehicle is already scheduled for the selected date
function checkVehicleSchedule(tripId, vehicleId) {
  const deliveryDate = document.getElementById('deliveryDateFrom').value;
  if (!deliveryDate || !vehicleId) return;

  fetch(`/api/vehicle_schedule_status?vehicle_id=${vehicleId}&date=${deliveryDate}`)
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        console.error('Error checking vehicle schedule:', data.error);
        return;
      }

      if (data.is_scheduled) {
        const errorDiv = document.getElementById(`vehicle-error-${tripId}`);
        const vehicleSelect = document.querySelector(`.trip-card[data-trip="${tripId}"] .vehicle-select`);

        // Show warning that vehicle is already scheduled
        const existingTrips = data.existing_schedules.map(s => `Trip #${s.trip_number}`).join(', ');
        errorDiv.innerHTML = `<strong>Warning:</strong> Vehicle ${data.vehicle} is already scheduled for ${data.date} (${existingTrips}). <a href="javascript:void(0)" onclick="proceedWithVehicle(${tripId})">Proceed anyway</a> or select a different vehicle.`;
        errorDiv.className = 'form-text text-warning';
        errorDiv.style.display = 'block';

        // Store the warning state
        vehicleSelect.setAttribute('data-has-schedule-warning', 'true');
      } else {
        // Clear any schedule warning
        const vehicleSelect = document.querySelector(`.trip-card[data-trip="${tripId}"] .vehicle-select`);
        vehicleSelect.removeAttribute('data-has-schedule-warning');
      }
    })
    .catch(err => console.error('Error checking vehicle schedule:', err));
}

// Allow user to proceed with duplicate schedule
function proceedWithVehicle(tripId) {
  const errorDiv = document.getElementById(`vehicle-error-${tripId}`);
  errorDiv.style.display = 'none';
}

// Calculate and update trip utilization
function updateTripUtilization(tripId) {
  const vehicleSelect = document.querySelector(`.trip-card[data-trip="${tripId}"] .vehicle-select`);
  const utilizationSpan = document.getElementById(`trip-${tripId}-utilization`);
  const totalCbm = parseFloat(document.getElementById(`trip-${tripId}-cbm`).textContent) || 0;

  if (!vehicleSelect.value) {
    utilizationSpan.textContent = 'No vehicle selected';
    utilizationSpan.className = '';
    return;
  }

  const selectedOption = vehicleSelect.options[vehicleSelect.selectedIndex];
  const capacity = parseFloat(selectedOption.getAttribute('data-capacity')) || 0;

  if (capacity === 0) {
    utilizationSpan.textContent = 'No capacity set';
    utilizationSpan.className = 'text-muted';
    return;
  }

  const utilization = (totalCbm / capacity) * 100;
  utilizationSpan.textContent = utilization.toFixed(1) + '%';

  // Color code based on utilization
  if (utilization > 100) {
    utilizationSpan.className = 'text-danger fw-bold';
  } else if (utilization > 90) {
    utilizationSpan.className = 'text-warning fw-bold';
  } else if (utilization > 75) {
    utilizationSpan.className = 'text-success';
  } else {
    utilizationSpan.className = 'text-info';
  }
}

// Update vehicle dropdowns to disable already-selected vehicles
function updateVehicleDropdowns() {
  const allSelects = document.querySelectorAll('.vehicle-select');
  const selectedVehicles = new Set();

  // First pass: collect all selected vehicles
  allSelects.forEach(select => {
    if (select.value) {
      selectedVehicles.add(select.value);
    }
  });

  // Second pass: disable options that are selected elsewhere
  allSelects.forEach(currentSelect => {
    const tripCard = currentSelect.closest('.trip-card');
    const currentTripId = tripCard.getAttribute('data-trip');
    const currentValue = currentSelect.value;

    // Get all options in this dropdown
    const options = currentSelect.querySelectorAll('option');

    options.forEach(option => {
      if (option.value) {
        // Check if this vehicle is selected in another trip
        const isUsedElsewhere = Array.from(allSelects).some(select => {
          const otherTripCard = select.closest('.trip-card');
          const otherTripId = otherTripCard.getAttribute('data-trip');

          return otherTripId !== currentTripId && select.value === option.value;
        });

        // Disable if used elsewhere and not the current selection
        if (isUsedElsewhere && option.value !== currentValue) {
          option.disabled = true;
        } else {
          option.disabled = false;
        }
      }
    });
  });
}

function removeBranchFromTrip(tripId, firstId, cbm, branchName, qty) {
  // Remove from the trip's shipment list
  const shipmentId = `shipment-${firstId}`;
  const element = document.getElementById(shipmentId);

  if (!element) return;

  // Get all data IDs for this branch
  const allIds = element.getAttribute('data-all-ids').split(',');
  element.remove();

  // Update the hidden input
  const idsInput = document.getElementById(`trip-${tripId}-ids`);
  const currentIds = idsInput.value.split(',');
  const newIds = currentIds.filter(id => !allIds.includes(id));
  idsInput.value = newIds.join(',');

  // Update the delivery orders hidden input
  const ordersInput = document.getElementById(`trip-${tripId}-orders`);
  const orders = ordersInput.value ? JSON.parse(ordersInput.value) : {};
  delete orders[firstId];
  ordersInput.value = JSON.stringify(orders);

  // Update the CBM total
  const currentCbm = parseFloat(document.getElementById(`trip-${tripId}-cbm`).textContent);
  const newCbm = currentCbm - cbm;
  document.getElementById(`trip-${tripId}-cbm`).textContent = newCbm.toFixed(2);

  // Update the Qty total
  const currentQty = parseInt(document.getElementById(`trip-${tripId}-qty`).textContent) || 0;
  const newQty = currentQty - (qty || 0);
  document.getElementById(`trip-${tripId}-qty`).textContent = Math.max(0, newQty);

  // Update utilization after removing shipments
  updateTripUtilization(tripId);

  // Re-enable all checkboxes for this branch in the main list
  allIds.forEach(id => {
    const checkbox = document.querySelector(`.shipment-checkbox[data-ids*="${id}"]`);
    if (checkbox) {
      checkbox.disabled = false;
      const row = checkbox.closest('tr');
      if (row) {
        // Only remove table-secondary and badge if no other IDs from this row are still assigned
        const checkboxIds = checkbox.dataset.ids.split(',');
        const anyStillAssigned = checkboxIds.some(cid => newIds.includes(cid));

        if (!anyStillAssigned) {
          row.classList.remove('table-secondary');
          // Also remove table-primary if it was still selected
          row.classList.remove('table-primary');
          const docCell = row.cells[1];
          const badge = docCell.querySelector('.badge');
          if (badge) badge.remove();
        }
      }
    }
  });
}

// Keep old function name for backward compatibility
function removeFromTrip(tripId, ids, cbm, documentNumber, qty = 0) {
  removeBranchFromTrip(tripId, ids.split(',')[0], cbm, documentNumber, qty);
}

// Form submission validation to prevent duplicate vehicles
document.getElementById('scheduleForm').addEventListener('submit', function(e) {
  const allSelects = document.querySelectorAll('.vehicle-select');
  const selectedVehicles = new Set();
  let duplicateFound = false;
  const tripIdsWithDuplicates = [];

  allSelects.forEach(select => {
    if (select.value) {
      if (selectedVehicles.has(select.value)) {
        duplicateFound = true;
        const tripCard = select.closest('.trip-card');
        const tripId = tripCard.getAttribute('data-trip');
        tripIdsWithDuplicates.push(tripId);
        const errorDiv = document.getElementById(`vehicle-error-${tripId}`);
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.className = 'form-text text-danger';
          errorDiv.textContent = 'Duplicate vehicle! Please select a different vehicle.';
        }
        select.classList.add('is-invalid');
      } else {
        selectedVehicles.add(select.value);
      }
    }
  });

  if (duplicateFound) {
    e.preventDefault();
    alert('Cannot save schedule: The same vehicle is assigned to multiple trips. Please select a different vehicle for each trip.');
    return false;
  }

  // Check for trips with vehicles but no assigned shipments
  const tripCards = document.querySelectorAll('.trip-card');
  let tripsWithoutShipments = [];

  tripCards.forEach(tripCard => {
    const tripId = tripCard.getAttribute('data-trip');
    const vehicleSelect = tripCard.querySelector('.vehicle-select');
    const idsInput = document.getElementById(`trip-${tripId}-ids`);

    // Check if trip has a vehicle selected but no shipments assigned
    if (vehicleSelect.value && (!idsInput.value || idsInput.value.trim() === '')) {
      tripsWithoutShipments.push(tripId);
    }
  });

  if (tripsWithoutShipments.length > 0) {
    e.preventDefault();
    const tripNumbers = tripsWithoutShipments.map(id => `#${id}`).join(', ');
    alert(`Cannot save schedule: Trip(s) ${tripNumbers} have vehicles selected but no shipments assigned. Please assign shipments to each trip or remove empty trips.`);
    return false;
  }

  // Check for unacknowledged schedule warnings (but allow proceeding)
  let hasUnacknowledgedWarnings = false;
  allSelects.forEach(select => {
    if (select.value && select.getAttribute('data-has-schedule-warning') === 'true') {
      const tripCard = select.closest('.trip-card');
      const tripId = tripCard.getAttribute('data-trip');
      const errorDiv = document.getElementById(`vehicle-error-${tripId}`);

      if (errorDiv && errorDiv.style.display !== 'none') {
        hasUnacknowledgedWarnings = true;
      }
    }
  });

  if (hasUnacknowledgedWarnings) {
    if (!confirm('Warning: One or more vehicles are already scheduled for this date. Do you want to proceed anyway?')) {
      e.preventDefault();
      return false;
    }
  }
});
</script>
