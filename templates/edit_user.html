{% extends "base.html" %}

{% block title %}Edit User - Trip Monitoring System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-pencil-square"></i> Edit User</h1>
    <a href="{{ url_for('manage_users') }}" class="btn btn-secondary">Back to Users</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ user.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="position" class="form-label">Position</label>
                    <select class="form-select" id="position" name="position" required>
                        <option value="">Select position</option>
                        <option value="admin" {% if user.position == 'admin' %}selected{% endif %}>Admin</option>
                        <option value="user" {% if user.position == 'user' %}selected{% endif %}>User</option>
                        <option value="executive" {% if user.position == 'executive' %}selected{% endif %}>Executive</option>
                        <option value="teamlead" {% if user.position == 'teamlead' %}selected{% endif %}>TeamLead</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status" required>
                        <option value="active" {% if user.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if user.status == 'inactive' %}selected{% endif %}>Inactive</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="daily_rate" class="form-label">Daily Rate (₱)</label>
                    <input type="number" class="form-control" id="daily_rate" name="daily_rate" step="0.01" min="0" value="{{ user.daily_rate or 0.0 }}" placeholder="0.0">
                    <div class="form-text">Daily rate for payroll calculations</div>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="sched_start" class="form-label">Schedule Start</label>
                    <input type="time" class="form-control" id="sched_start" name="sched_start" value="{{ user.sched_start or '08:00' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="sched_end" class="form-label">Schedule End</label>
                    <input type="time" class="form-control" id="sched_end" name="sched_end" value="{{ user.sched_end or '18:00' }}">
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password (leave blank to keep current)</label>
                <input type="password" class="form-control" id="password" name="password" minlength="6">
                <div class="form-text">Enter new password only if you want to change it (minimum 6 characters)</div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Update User</button>
                <a href="{{ url_for('manage_users') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
