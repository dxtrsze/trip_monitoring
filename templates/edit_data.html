{% extends "base.html" %}

{% block title %}Edit Data - Trip Monitoring System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-pencil-square"></i> Edit Delivery Data</h1>
    <a href="{{ url_for('view_data') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Data
    </a>
</div>

<div class="card mt-4">
    <div class="card-body">
        <form method="post">
            <!-- Row 1: Core Identifiers -->
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="type" class="form-label">Type</label>
                    <input type="text" class="form-control" id="type" name="type" value="{{ data.type }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="document_number" class="form-label">Document Number</label>
                    <input type="text" class="form-control" id="document_number" name="document_number" value="{{ data.document_number }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="item_number" class="form-label">Item No.</label>
                    <input type="text" class="form-control" id="item_number" name="item_number" value="{{ data.item_number }}" required>
                </div>
            </div>

            <!-- Row 2: Dates & Status -->
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="posting_date" class="form-label">Posting Date</label>
                    <input type="date" class="form-control" id="posting_date" name="posting_date" 
                           value="{{ data.posting_date.strftime('%Y-%m-%d') if data.posting_date else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="due_date" class="form-label">Due Date</label>
                    <input type="date" class="form-control" id="due_date" name="due_date" 
                           value="{{ data.due_date.strftime('%Y-%m-%d') if data.due_date else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="document_status" class="form-label">Document Status</label>
                    <select class="form-select" id="document_status" name="document_status">
                        <option value="O" {% if data.document_status == 'O' %}selected{% endif %}>Open</option>
                        <option value="C" {% if data.document_status == 'C' %}selected{% endif %}>Closed</option>
                        <option value="" {% if not data.document_status %}selected{% endif %}>—</option>
                    </select>
                </div>
            </div>

            <!-- Row 3: Quantities -->
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="ordered_qty" class="form-label">Ordered Quantity</label>
                    <input type="number" class="form-control" id="ordered_qty" name="ordered_qty" value="{{ data.ordered_qty }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="delivered_qty" class="form-label">Delivered Quantity</label>
                    <input type="number" step="0.01" class="form-control" id="delivered_qty" name="delivered_qty" value="{{ data.delivered_qty }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="remaining_open_qty" class="form-label">Remaining Open Qty</label>
                    <input type="number" step="0.01" class="form-control" id="remaining_open_qty" name="remaining_open_qty" value="{{ data.remaining_open_qty }}">
                </div>
            </div>

            <!-- Row 4: Warehouses & UOM -->
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="from_whse_code" class="form-label">From Warehouse Code</label>
                    <input type="text" class="form-control" id="from_whse_code" name="from_whse_code" value="{{ data.from_whse_code }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="to_whse" class="form-label">To Warehouse</label>
                    <input type="text" class="form-control" id="to_whse" name="to_whse" value="{{ data.to_whse }}">
                </div>
                <!-- <div class="col-md-4 mb-3">
                    <label for="pur_slr_uom_if_base_unit" class="form-label">Pur/Slr UOM (if base unit)</label>
                    <input type="text" class="form-control" id="pur_slr_uom_if_base_unit" name="pur_slr_uom_if_base_unit" value="{{ data.pur_slr_uom_if_base_unit }}">
                </div> -->
            </div>

            <!-- Row 5: PO & ISMS -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="po_number" class="form-label">PO Number</label>
                    <input type="text" class="form-control" id="po_number" name="po_number" value="{{ data.po_number }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="isms_so_number" class="form-label">ISMS SO#</label>
                    <input type="text" class="form-control" id="isms_so_number" name="isms_so_number" value="{{ data.isms_so_number }}">
                </div>
            </div>

            <!-- Row 6: Branch & Customer -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="branch_name" class="form-label">Branch Name</label>
                    <input type="text" class="form-control" id="branch_name" name="branch_name" value="{{ data.branch_name }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="branch_name_v2" class="form-label">Branch Name v2</label>
                    <input type="text" class="form-control" id="branch_name_v2" name="branch_name_v2" value="{{ data.branch_name_v2 }}">
                </div>
            </div>

            <!-- Row 7: Customer/Vendor -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="customer_vendor_code" class="form-label">Customer/Vendor Code</label>
                    <input type="text" class="form-control" id="customer_vendor_code" name="customer_vendor_code" value="{{ data.customer_vendor_code }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="customer_vendor_name" class="form-label">Customer/Vendor Name</label>
                    <input type="text" class="form-control" id="customer_vendor_name" name="customer_vendor_name" value="{{ data.customer_vendor_name }}">
                </div>
            </div>

            <!-- Row 8: Volume & Instructions -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="cbm" class="form-label">CBM</label>
                    <input type="number" step="0.01" class="form-control" id="cbm" name="cbm" value="{{ data.cbm }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="user_code" class="form-label">User Code</label>
                    <input type="text" class="form-control" id="user_code" name="user_code" value="{{ data.user_code }}">
                </div>
            </div>

            <!-- Special Instructions -->
            <div class="mb-3">
                <label for="special_instructions" class="form-label">Special Instructions</label>
                <textarea class="form-control" id="special_instructions" name="special_instructions" rows="3">{{ data.special_instructions }}</textarea>
            </div>

            <!-- Remarks -->
            <div class="mb-3">
                <label for="remarks" class="form-label">Remarks</label>
                <textarea class="form-control" id="remarks" name="remarks" rows="2">{{ data.remarks }}</textarea>
            </div>

            <!-- Status (Trip-related) -->
            <div class="mb-3">
                <label for="status" class="form-label">Trip Status</label>
                <select class="form-select" id="status" name="status">
                    <option value="Not Scheduled" {% if data.status == 'Not Scheduled' %}selected{% endif %}>Not Scheduled</option>
                    <option value="Scheduled" {% if data.status == 'Scheduled' %}selected{% endif %}>Scheduled</option>
                    <option value="Cancelled" {% if data.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('view_data') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
